name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read
  checks: write         # required by dorny/test-reporter to post inline results
  pull-requests: write  # required to post coverage comment on PRs

jobs:
  # ── Build and test ──────────────────────────────────────────────────────────
  # Runs under both GCC and Clang to catch compiler-specific issues.
  build-and-test:
    name: Build & Test (${{ matrix.compiler }})
    runs-on: ubuntu-24.04
    timeout-minutes: 120

    strategy:
      fail-fast: false
      matrix:
        compiler: [g++-13, clang++-18]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # ── System dependencies ───────────────────────────────────────────────
      - name: Install system dependencies
        run: |
          sudo apt-get update -q
          sudo apt-get install -y --no-install-recommends \
            g++-13 \
            clang-18 \
            cmake \
            ninja-build \
            libfiu-dev

      - name: Install Python tools
        run: |
          pip3 install --user "clang-format==22.1.5"
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"

      # ── vcpkg (Boost, Folly, Poco, libcoap, …) ───────────────────────────
      - name: Cache vcpkg packages
        uses: actions/cache@v4
        id: vcpkg-cache
        with:
          path: vcpkg_installed
          key: vcpkg-${{ runner.os }}-${{ hashFiles('vcpkg.json') }}

      - name: Bootstrap vcpkg and install dependencies
        if: steps.vcpkg-cache.outputs.cache-hit != 'true'
        run: |
          # Blobless clone: full commit+tree history (needed for git read-tree
          # when vcpkg checks out port files), but no file blobs until accessed.
          git clone --filter=blob:none https://github.com/microsoft/vcpkg.git /tmp/vcpkg
          /tmp/vcpkg/bootstrap-vcpkg.sh -disableMetrics
          /tmp/vcpkg/vcpkg install --triplet x64-linux --no-print-usage
        env:
          VCPKG_DEFAULT_TRIPLET: x64-linux

      # ── Format check ──────────────────────────────────────────────────────
      # Only run once (not per compiler) since formatting is compiler-agnostic.
      - name: Configure (format-check)
        if: matrix.compiler == 'g++-13'
        run: |
          cmake -B build-fmt -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_CXX_COMPILER=g++-13 \
            -DCMAKE_PREFIX_PATH=${{ github.workspace }}/vcpkg_installed/x64-linux

      - name: Check formatting
        if: matrix.compiler == 'g++-13'
        run: cmake --build build-fmt --target format-check

      # ── Release build + tests ─────────────────────────────────────────────
      - name: Configure (Release)
        run: |
          cmake -B build -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_CXX_COMPILER=${{ matrix.compiler }} \
            -DCMAKE_PREFIX_PATH=${{ github.workspace }}/vcpkg_installed/x64-linux \
            -DCMAKE_EXPORT_COMPILE_COMMANDS=ON

      - name: Build
        run: cmake --build build -j$(nproc)

      - name: Test
        id: test
        run: |
          ctest --test-dir build \
            -j$(nproc) \
            --output-on-failure \
            --output-junit ${{ github.workspace }}/test-results.xml \
            -LE '^(slow|performance|verbose|benchmark|docker)$'
        continue-on-error: true

      - name: Publish test results
        uses: dorny/test-reporter@v1
        if: always()
        with:
          name: Unit Tests (${{ matrix.compiler }})
          path: test-results.xml
          reporter: java-junit
          fail-on-error: false
          fail-on-empty: false

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results-${{ matrix.compiler }}
          path: test-results.xml

      - name: Fail if tests failed
        if: steps.test.outcome == 'failure'
        run: exit 1

  # ── Coverage (clang only) ────────────────────────────────────────────────────
  # ENABLE_COVERAGE uses LLVM source-based instrumentation and requires clang.
  # gcovr-based coverage with GCC is not supported by this project's CMakeLists.
  coverage:
    name: Coverage (clang++-18)
    runs-on: ubuntu-24.04
    timeout-minutes: 120

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update -q
          sudo apt-get install -y --no-install-recommends \
            clang-18 \
            llvm-18 \
            cmake \
            ninja-build \
            libfiu-dev

      - name: Cache vcpkg packages
        uses: actions/cache@v4
        id: vcpkg-cache
        with:
          path: vcpkg_installed
          key: vcpkg-${{ runner.os }}-${{ hashFiles('vcpkg.json') }}

      - name: Bootstrap vcpkg and install dependencies
        if: steps.vcpkg-cache.outputs.cache-hit != 'true'
        run: |
          git clone --filter=blob:none https://github.com/microsoft/vcpkg.git /tmp/vcpkg
          /tmp/vcpkg/bootstrap-vcpkg.sh -disableMetrics
          /tmp/vcpkg/vcpkg install --triplet x64-linux --no-print-usage
        env:
          VCPKG_DEFAULT_TRIPLET: x64-linux

      # ── Coverage build + tests ────────────────────────────────────────────
      - name: Configure (Coverage)
        run: |
          cmake -B build-coverage -G Ninja \
            -DENABLE_COVERAGE=ON \
            -DCMAKE_BUILD_TYPE=Debug \
            -DCMAKE_CXX_COMPILER=clang++-18 \
            -DCMAKE_PREFIX_PATH=${{ github.workspace }}/vcpkg_installed/x64-linux

      - name: Build (Coverage)
        run: cmake --build build-coverage -j$(nproc)

      - name: Test (Coverage)
        id: test-coverage
        run: |
          find build-coverage -name '*.profraw' -delete
          LLVM_PROFILE_FILE='${{ github.workspace }}/build-coverage/%p-%m.profraw' \
          ctest --test-dir build-coverage \
            -j$(nproc) \
            --output-on-failure \
            --output-junit ${{ github.workspace }}/coverage-test-results.xml \
            --repeat until-pass:3 \
            -LE '^(slow|performance|verbose|benchmark|docker)$'
        continue-on-error: true

      - name: Publish coverage test results
        uses: dorny/test-reporter@v1
        if: always()
        with:
          name: Coverage Tests
          path: coverage-test-results.xml
          reporter: java-junit
          fail-on-error: false
          fail-on-empty: false

      - name: Upload coverage test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-test-results
          path: coverage-test-results.xml

      - name: Fail if coverage tests failed
        if: steps.test-coverage.outcome == 'failure'
        run: exit 1

      # ── Measure coverage and enforce floor ────────────────────────────────
      - name: Measure coverage
        id: coverage
        run: |
          # Merge per-process profiles into a single profdata file.
          mapfile -t PROFRAW < <(find build-coverage -name '*.profraw')
          llvm-profdata-18 merge -sparse "${PROFRAW[@]}" \
            -o build-coverage/merged.profdata

          # Collect instrumented test binaries (no extension = executable).
          mapfile -t BINS < <(find build-coverage/tests -maxdepth 1 \
            -executable -type f | sort)
          MAIN_BIN="${BINS[0]}"
          EXTRA_ARGS=()
          for b in "${BINS[@]:1}"; do EXTRA_ARGS+=(-object "$b"); done

          IGNORE=(
            --ignore-filename-regex='.*/build-coverage/.*'
            --ignore-filename-regex='.*/vcpkg_installed/.*'
            --ignore-filename-regex='.*/usr/.*'
            --ignore-filename-regex='.*/cmd/.*'
            --ignore-filename-regex='.*/tests/docker_chaos/.*'
            --ignore-filename-regex='.*/tests/aws_quorum_manager_localstack_test.*'
            --ignore-filename-regex='.*/tests/aws_quorum_manager_real_ec2_test.*'
            --ignore-filename-regex='.*/examples/.*'
          )

          # Line-coverage summary (TOTAL line col 7 is line-coverage %).
          llvm-cov-18 report \
            --instr-profile=build-coverage/merged.profdata \
            "$MAIN_BIN" "${EXTRA_ARGS[@]}" \
            "${IGNORE[@]}" | tee build-coverage/coverage-summary.txt

          # HTML report.
          mkdir -p ${{ github.workspace }}/coverage-html
          llvm-cov-18 show \
            --instr-profile=build-coverage/merged.profdata \
            "$MAIN_BIN" "${EXTRA_ARGS[@]}" \
            --format=html \
            --output-dir=${{ github.workspace }}/coverage-html \
            "${IGNORE[@]}"

          # Parse coverage percentage from the TOTAL row.
          # llvm-cov report columns: Filename Regions Miss Cover% Functions Miss Cover% Lines Miss Cover% ...
          # $7 is the function-coverage % — matches the field used by the pre-commit hook to set the floor.
          NEW_PCT=$(awk '/^TOTAL/ { gsub(/%/, "", $7); print $7; exit }' \
            build-coverage/coverage-summary.txt)
          OLD_FLOOR=$(cat ${{ github.workspace }}/coverage_floor.txt)

          echo "Coverage: ${NEW_PCT}%  Floor: ${OLD_FLOOR}%"
          echo "coverage_pct=${NEW_PCT}" >> "$GITHUB_OUTPUT"

          awk -v new="${NEW_PCT}" -v old="${OLD_FLOOR}" \
            'BEGIN { if (new+0 < old+0) {
              printf "FAILED: %.2f%% is below floor %.2f%%\n", new, old; exit 1 } }'

      - name: Write coverage job summary
        if: always() && steps.coverage.outputs.coverage_pct != ''
        run: |
          PCT="${{ steps.coverage.outputs.coverage_pct }}"
          FLOOR=$(cat ${{ github.workspace }}/coverage_floor.txt)
          if awk "BEGIN { exit !($PCT >= 85) }"; then
            ICON="🟢"
          elif awk "BEGIN { exit !($PCT >= 70) }"; then
            ICON="🟡"
          else
            ICON="🔴"
          fi
          {
            echo "## ${ICON} Coverage Report"
            echo ""
            echo "| | Value |"
            echo "|---|---|"
            echo "| **Line coverage** | **${PCT}%** |"
            echo "| Floor | ${FLOOR}% |"
            echo ""
            echo "<details><summary>Full llvm-cov summary</summary>"
            echo ""
            echo '```'
            cat build-coverage/coverage-summary.txt
            echo '```'
            echo ""
            echo "</details>"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Post coverage PR comment
        if: github.event_name == 'pull_request' && steps.coverage.outputs.coverage_pct != ''
        uses: actions/github-script@v7
        with:
          script: |
            const pct  = '${{ steps.coverage.outputs.coverage_pct }}';
            const floor = require('fs').readFileSync('${{ github.workspace }}/coverage_floor.txt', 'utf8').trim();
            const icon  = parseFloat(pct) >= 85 ? '🟢' : parseFloat(pct) >= 70 ? '🟡' : '🔴';
            const body  = `## ${icon} Coverage Report\n\n| | Value |\n|---|---|\n| **Line coverage** | **${pct}%** |\n| Floor | ${floor}% |`;
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner, repo: context.repo.repo,
              issue_number: context.issue.number,
            });
            const existing = comments.find(c => c.user.login === 'github-actions[bot]' && c.body.includes('Coverage Report'));
            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner, repo: context.repo.repo,
                comment_id: existing.id, body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner, repo: context.repo.repo,
                issue_number: context.issue.number, body,
              });
            }

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-report
          path: coverage-html/

  # ── API documentation → GitHub Pages ───────────────────────────────────────
  # Runs only on pushes to main (not on pull-request builds).
  # Requires GitHub Pages to be enabled in the repository settings with the
  # source set to "GitHub Actions".
  docs:
    if: github.event_name == 'push'
    runs-on: ubuntu-24.04
    timeout-minutes: 30

    permissions:
      contents: read
      pages: write       # upload Pages artifact
      id-token: write    # request OIDC token for deployment

    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Doxygen
        run: |
          sudo apt-get update -q
          sudo apt-get install -y --no-install-recommends doxygen

      - name: Generate documentation
        run: doxygen Doxyfile

      - name: Setup GitHub Pages
        uses: actions/configure-pages@v4

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: doxygen-output/html

      - name: Deploy to GitHub Pages
        id: deploy
        uses: actions/deploy-pages@v4
